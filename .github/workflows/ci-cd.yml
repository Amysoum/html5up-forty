name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build du projet
        run: echo "Build terminé"

  scan-trivy:
    name: Security Scan Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: scan-trivy
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement
        run: echo "Déploiement effectué avec succès"