name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  scan-trivy:
    name: Security Scan Trivy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: scan-trivy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy
        run: echo "Deploiement effectue"
```

Sauvegarde `Ctrl+S` puis :
