name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  scan-trivy:
    name: Security Scan Trivy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: scan-trivy
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Déploiement
        run: echo "Déploiement effectué avec succès"
```

**Commande 3 :**
```
git add .github/workflows/ci-cd.yml
```

**Commande 4 :**
```
git commit -m "fix: 2 jobs on main"
```

**Commande 5 :**
```
git push origin main